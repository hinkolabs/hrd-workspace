/* Loading */
.loadingBox {opacity:0; position:fixed; left:0; top:0; background:white; width:100%; height:100%; transition: all .2s ease; z-index:9999;}
.loader {position:relative; left:50%; top:50%; background:#007aff; border-radius:12px; width:12px; height:12px; margin:-6px 0 0 -6px;}

.loader:before {content:""; position:absolute; top:0; border-radius:12px; width:12px; height:12px;
  -webkit-animation: loaderg 3s ease-in-out infinite;
  animation: loaderg 3s ease-in-out infinite;
}
.loader:after {content:""; position:absolute; top:0; border-radius:12px; width:12px; height:12px;
  -webkit-animation: loaderd 3s ease-in-out infinite;
  animation: loaderd 3s ease-in-out infinite;
}

@-webkit-keyframes loaderg {
  0% {left:-25px; background-color: rgba(0, 122, 255, .8);}
  50% {left:0px; background-color: rgba(0, 122, 255, .1);}
  100% {left:-25px; background-color: rgba(0, 122, 255, .8);}
}

  0% {left:-25px; background-color: rgba(0, 122, 255, .8);}
  50% {left:0px; background-color: rgba(0, 122, 255, .1);}
  100% {left:-25px; background-color: rgba(0, 122, 255, .8);}
}

.loading-fixed{
    width: 40px;
    height: 40px;
    z-index: 9999; /*吏곸젒 �엯�젰 �빐二쇱뼱�빞 �빀�땲�떎*/
    transform:rotate(45deg);
    -ms-transform:rotate(45deg);
    animation:loading-fixed-ani1 3s ease-in-out infinite;
    display: none;
}
.loading-fixed i{
    width: 40px;
    height: 40px;
    display: inline-block;
    border-radius: 50%;
    position:absolute;

}
.loading-fixed i:nth-child(1){
    background: #ff5954;
    transform:translate(0,50px);
    -ms-transform:translate(0,50px);
    animation:loading-fixed-ani2 3s ease-in-out infinite;
}
.loading-fixed i:nth-child(2){
    background: #1f4c59;
    transform:rotate(90deg) translate(0,50px);
    -ms-transform:rotate(90deg) translate(0,50px);
    animation:loading-fixed-ani3 3s ease-in-out infinite;
}
.loading-fixed i:nth-child(3){
    background: #00b39f;
    transform:rotate(180deg) translate(0,50px);
    -ms-transform:rotate(180deg) translate(0,50px);
    animation:loading-fixed-ani4 3s ease-in-out infinite;
}
.loading-fixed i:nth-child(4){
    background: #ffb364;
    transform:rotate(270deg) translate(0,50px);
    -ms-transform:rotate(270deg) translate(0,50px);
    animation:loading-fixed-ani5 3s ease-in-out infinite;
}
@keyframes loading-fixed-ani1{
    25%{
        transform:rotate(135deg);
        -ms-transform:rotate(135deg);
    }
    50%{
        transform:rotate(225deg);
        -ms-transform:rotate(225deg);
    }
    75%{
        transform:rotate(315deg);
        -ms-transform:rotate(315deg);
    }
    100%{
        transform:rotate(405deg);
        -ms-transform:rotate(405deg);
    }
}
@keyframes loading-fixed-ani2{
    17.5%,25%,42.5%,50%,67.5%,75%,92.5%,100%{
        transform:translate(0,50px);
        -ms-transform:translate(0,50px);
    }
    12.5%,37.5%,62.5%,87.5%{
        transform:translate(0,35px);
        -ms-transform:translate(0,35px);
    }
}
@keyframes loading-fixed-ani3{
    17.5%,25%,42.5%,50%,67.5%,75%,92.5%,100%{
        transform:rotate(90deg) translate(0,50px);
        -ms-transform:rotate(90deg) translate(0,50px);
    }
    12.5%,37.5%,62.5%,87.5%{
        transform:rotate(90deg) translate(0,35px);
        -ms-transform:rotate(90deg) translate(0,35px);
    }
}
@keyframes loading-fixed-ani4{

        transform:rotate(180deg) translate(0,50px);
        -ms-transform:rotate(180deg) translate(0,50px);

#studyWrap .mainCalendar {background:white; border:1px solid #e4eaeb; height:274px; margin-top:20px;}
#studyWrap .mainCalendar .ui-datepicker {width:100%; padding:0;}
#studyWrap .mainCalendar .ui-datepicker-title {font-size:17px; font-weight:700; line-height:56px;}
#studyWrap .mainCalendar .ui-datepicker-prev {background: url('https://edu.hanaw.com/resources/template/web/T0002/images/ui/icon_calendar_prev.png') center no-repeat; left:0; top:0; width:56px; height:56px; cursor:pointer;}
#studyWrap .mainCalendar .ui-datepicker-next {background: url('https://edu.hanaw.com/resources/template/web/T0002/images/ui/icon_calendar_next.png') center no-repeat; right:0; top:0; width:56px; height:56px; cursor:pointer;}
#studyWrap .mainCalendar .ui-datepicker-calendar thead {background:#1f8cdd; font-weight:700; text-transform:uppercase; color:white;}
#studyWrap .mainCalendar .ui-datepicker-calendar th {height:29px; padding:0 8px; text-align:center; vertical-align:middle;}
#studyWrap .mainCalendar .ui-datepicker-calendar th:first-child {width:59px; text-align:right;}
#studyWrap .mainCalendar .ui-datepicker-calendar th:last-child {width:59px; text-align:left;}
#studyWrap .mainCalendar .ui-datepicker-calendar td {height:29px; padding:0; font-family:"verdana"; text-align:center; vertical-align:middle;}
#studyWrap .mainCalendar .ui-datepicker-calendar td span,
#studyWrap .mainCalendar .ui-datepicker-calendar td a {display:inline-block; border:1px solid transparent; border-radius:50%; width:24px; padding:0; line-height:22px; text-align:center;}
#studyWrap .mainCalendar .ui-datepicker-calendar td span {color:#b9bfd7;}
#studyWrap .mainCalendar .ui-datepicker-calendar td a {color:#666;}
#studyWrap .mainCalendar .ui-datepicker-calendar td:first-child {text-align:right;}
#studyWrap .mainCalendar .ui-datepicker-calendar td:last-child {text-align:left;}
#studyWrap .mainCalendar .ui-datepicker-calendar tr:first-child td {padding-top:8px;}
#studyWrap .mainCalendar .ui-datepicker-calendar td a.ui-state-active {border:1px solid #228ddd;}
